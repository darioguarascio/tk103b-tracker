# Sample docker-compose — copy to your host with a .env file (see .env.example).
# Requires an external PostGIS database. Images from Docker Hub.

services:
  app:
    image: darioguarascio/tk103b-tracker:${IMAGE_TAG:-latest}
    container_name: tk103b.app
    ports:
      - "${APP_PORT:-9060}:3001"
    env_file: .env
    environment:
      PORT: 3001
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  ingest:
    image: darioguarascio/tk103b-tracker-ingest:${IMAGE_TAG:-latest}
    container_name: tk103b.ingest
    ports:
      - "${INGEST_PORT:-9000}:9000"
    env_file: .env
    restart: unless-stopped

  # One-time schema setup: docker compose --profile init run --rm db-init
  db-init:
    image: darioguarascio/tk103b-tracker:${IMAGE_TAG:-latest}
    container_name: tk103b.db-init
    command: node scripts/init-db.js
    env_file: .env
    profiles: ["init"]
    restart: "no"
