name: Release

on:
  push:
    tags: ['v*']

env:
  APP_IMAGE: darioguarascio/tk103b-tracker
  INGEST_IMAGE: darioguarascio/tk103b-tracker-ingest

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker meta (app)
        id: meta-app
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.APP_IMAGE }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build and push app
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta-app.outputs.tags }}
          labels: ${{ steps.meta-app.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Docker meta (ingest)
        id: meta-ingest
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.INGEST_IMAGE }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build and push ingest
        uses: docker/build-push-action@v6
        with:
          context: ./ingest
          file: ingest/Dockerfile
          push: true
          tags: ${{ steps.meta-ingest.outputs.tags }}
          labels: ${{ steps.meta-ingest.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
